x-airflow-common:
  &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__CORE__PLUGINS_FOLDER: /opt/airflow/plugins
    # Make `agent/` importable alongside the existing `plugins/` package
    PYTHONPATH: /opt/airflow
    AIRFLOW_CONN_SLACK_ALERTS: "slack://xoxb-your-bot-token@/#data-pipeline-alerts"
    # Warehouse DB the pipeline loads into (separate from Airflow's own metadata DB)
    WAREHOUSE_DB_URL: postgresql+psycopg2://warehouse:warehouse@warehouse-db:5432/warehouse
    # --- Investigation agent ---
    # GROQ_API_KEY and SLACK_WEBHOOK_URL are injected from .env (never hard-coded here)
    GROQ_API_KEY: ${GROQ_API_KEY:-}
    GROQ_MODEL: llama-3.3-70b-versatile
    AGENT_MAX_TOOL_ITERATIONS: "6"
    # psycopg2-native DSN for the warehouse (agent uses psycopg2 directly, not SQLAlchemy)
    PIPELINE_POSTGRES_DSN: postgresql://warehouse:warehouse@warehouse-db:5432/warehouse
    AIRFLOW_LOGS_DIR: /opt/airflow/logs
    AGENT_REPORTS_DIR: /opt/airflow/agent/reports
    SCHEMA_BASELINE_PATH: /opt/airflow/agent/schema_baseline.json
    SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    _PIP_ADDITIONAL_REQUIREMENTS: >-
      great-expectations==0.18.19
      requests==2.32.3
  volumes:
    - ./dags:/opt/airflow/dags
    - ./plugins:/opt/airflow/plugins
    - ./logs:/opt/airflow/logs
    - ./agent:/opt/airflow/agent
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    airflow-db:
      condition: service_healthy
    warehouse-db:
      condition: service_healthy

services:

  # --- Airflow's own metadata database ---
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: always

  # --- Warehouse database the pipeline loads into ---
  warehouse-db:
    image: postgres:16
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    ports:
      - "5433:5432"   # exposed for local inspection: psql -h localhost -p 5433 -U warehouse warehouse
    volumes:
      - warehouse-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "warehouse"]
      interval: 5s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@example.com
    environment:
      <<: *airflow-common-env
    depends_on:
      <<: *airflow-common-depends-on

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-db-volume:
  warehouse-db-volume:
